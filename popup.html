<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SlopTube - AI Voice Detector</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup-container">
        <div class="header">
            <div class="logo">🤖</div>
            <div class="title">
                <h1>SlopTube</h1>
                <p>AI Voice Detector</p>
            </div>
        </div>
        
        <div class="current-status">
            <div class="status-card">
                <div class="status-title">Current Video</div>
                <div class="status-result" id="currentResult">
                    <span class="result-text">No video detected</span>
                    <span class="result-confidence"></span>
                </div>
            </div>
        </div>
        
        <div class="history-section">
            <h3>Recent Analysis</h3>
            <div class="history-list" id="historyList">
                <div class="no-history">No recent analysis available</div>
            </div>
        </div>
        
        <div class="settings-section">
            <h3>Settings</h3>
            <div class="setting-item">
                <label for="threshold">Detection Threshold:</label>
                <input type="range" id="threshold" min="0.1" max="1.0" step="0.1" value="0.7">
                <span class="threshold-value">70%</span>
            </div>
            
            <div class="setting-item">
                <label>
                    <input type="checkbox" id="enableNotifications">
                    Show notifications for AI detection
                </label>
            </div>
            
            <div class="setting-item">
                <label>
                    <input type="checkbox" id="enableAutoAnalysis" checked>
                    Auto-analyze videos
                </label>
            </div>
        </div>
        
        <div class="footer">
            <div class="version">v1.0.0</div>
            <div class="links">
                <a href="#" id="helpLink">Help</a>
                <a href="#" id="reportLink">Report Issue</a>
            </div>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
